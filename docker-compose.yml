version: "3.9"

# ── MedAssist AI — Docker Compose ────────────────────────────────────────────
# Usage:
#   Local dev (hot reload):   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Production (Docker only): docker compose up -d --build
#
# Copy .env.example → .env and fill in secrets before first run.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: medassist_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-medassist_db}
      POSTGRES_USER:     ${POSTGRES_USER:-medassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medassist} -d ${POSTGRES_DB:-medassist_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medassist_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:                  postgresql://${POSTGRES_USER:-medassist}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-medassist_db}
      SECRET_KEY:                    ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM:                     ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES:   ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS:     ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      ALLOWED_ORIGINS:               ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      ENVIRONMENT:                   ${ENVIRONMENT:-production}
      MPESA_CONSUMER_KEY:            ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET:         ${MPESA_CONSUMER_SECRET:-}
      MPESA_PASSKEY:                 ${MPESA_PASSKEY:-}
      MPESA_SHORTCODE:               ${MPESA_SHORTCODE:-}
      MPESA_ENVIRONMENT:             ${MPESA_ENVIRONMENT:-sandbox}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: medassist_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: medassist_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot (SSL — run once then remove) ───────────────────────────────────
  # To issue cert:  docker compose run --rm certbot certonly --webroot
  #                   --webroot-path=/var/www/certbot -d medassist-ai.com
  # To renew:       docker compose run --rm certbot renew
  certbot:
    image: certbot/certbot:latest
    container_name: medassist_certbot
    profiles: ["ssl"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL:-admin@medassist.co.ke} --agree-tos --no-eff-email -d ${DOMAIN:-medassist-ai.com}

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
