upstream medassist_backend {
    server backend:8000;
    keepalive 32;
}

upstream medassist_frontend {
    server frontend:80;
    keepalive 16;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    server_name medassist-ai.com www.medassist-ai.com demo.medassist-ai.com _;

    # Allow Let's Encrypt ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name medassist-ai.com www.medassist-ai.com demo.medassist-ai.com;

    # SSL — issued by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/medassist-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medassist-ai.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/medassist-ai.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # ── API proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://medassist_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend health/docs (keep accessible)
    location ~ ^/(health|docs|redoc|openapi\.json) {
        proxy_pass http://medassist_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://medassist_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
