# HTTP-only config for local Docker Compose (no SSL needed)
upstream medassist_backend {
    server backend:8000;
}

upstream medassist_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost _;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://medassist_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/(health|docs|redoc|openapi\.json) {
        proxy_pass http://medassist_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://medassist_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
